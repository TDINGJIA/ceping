
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州黑白调科技有限公司 — 应聘登记表</title>
<style>
  :root {
    --primary: #2c3e6b;
    --accent: #4a6fa5;
    --bg: #f5f7fa;
    --card: #fff;
    --border: #e0e4ea;
    --text: #333;
    --text2: #777;
    --danger: #e74c3c;
    --required: #e74c3c;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    text-align: center;
    padding: 28px 20px 24px;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 6px; }

  /* Container */
  .container { max-width: 680px; margin: 0 auto; padding: 16px; }

  /* Section */
  .section {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .section-title {
    background: #f8f9fc;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-num {
    background: var(--accent);
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .section-body { padding: 16px 20px; }

  /* Form rows */
  .form-row {
    margin-bottom: 14px;
  }
  .form-row:last-child { margin-bottom: 0; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }
  .required:after {
    content: " *";
    color: var(--required);
    font-weight: 700;
  }

  /* Inputs */
  input[type="text"],
  input[type="tel"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 10px 14px;
    font-size: 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fafbfc;
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,111,165,0.1);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 60px; }

  /* Radio / Checkbox */
  .radio-group, .check-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .radio-item, .check-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fafbfc;
    transition: all 0.2s;
  }
  .radio-item:has(input:checked), .check-item:has(input:checked) {
    border-color: var(--accent);
    background: #eef3fa;
    color: var(--primary);
    font-weight: 600;
  }
  .radio-item input, .check-item input { accent-color: var(--accent); }

  /* Conditional field */
  .conditional { display: none; margin-top: 8px; }
  .conditional.show { display: block; }

  /* Buttons */
  .btn-submit {
    width: 100%;
    padding: 14px;
    font-size: 16px; font-weight: 600;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    border: none;
    border-radius: var(--radius);
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(44,62,107,0.25);
    transition: all 0.2s;
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(44,62,107,0.35); }

  /* Declaration */
  .declaration {
    background: #fef9f0;
    border: 1px solid #f0d9a8;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: #8a6d3b;
    line-height: 1.8;
  }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 12px 28px;
    border-radius: 24px; font-size: 14px; font-weight: 600;
    z-index: 9999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text2);
  }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 17px; }
    .radio-group { flex-direction: column; }
    .container { padding: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>杭州黑白调科技有限公司</h1>
  <p>应聘登记表 · 请认真如实填写（全部必填）</p>
</div>

<div class="container">
<form id="applicationForm">

  <!-- ═══ 模块1：承诺说明 ═══ -->
  <div class="section">
    <div class="section-title">
      <span class="section-num">1</span> 承诺说明
    </div>
    <div class="section-body">
      <div class="declaration">
        <strong>本人承诺：</strong>以上所提供的资料及信息均真实准确无误，并接受杭州黑白调科技有限公司以任何形式对本人提供的资料及信息进行背景调查，若所提供的信息有误，本人愿承担由此产生的任何后果。
      </div>
    </div>
  </div>

  <!-- ═══ 模块2：基础信息 ═══ -->
  <div class="section">
    <div class="section-title">
      <span class="section-num">2</span> 基础信息
    </div>
    <div class="section-body">

      <div class="form-row">
        <label class="form-label required">您的姓名</label>
        <input type="text" name="name" required placeholder="请输入姓名">
      </div>

      <div class="form-row">
        <label class="form-label required">出生年月日</label>
        <input type="date" name="birthday" required>
      </div>

      <div class="form-row">
        <label class="form-label required">民族</label>
        <input type="text" name="ethnicity" required placeholder="如：汉族">
      </div>

      <div class="form-row">
        <label class="form-label required">婚姻状况</label>
        <div class="radio-group" id="maritalGroup">
          <label class="radio-item"><input type="radio" name="marital" value="未婚" required> 未婚</label>
          <label class="radio-item"><input type="radio" name="marital" value="已婚"> 已婚</label>
          <label class="radio-item"><input type="radio" name="marital" value="离异"> 离异</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label required">现住址</label>
        <input type="text" name="address" required placeholder="请填写详细地址">
      </div>

      <div class="form-row">
        <label class="form-label required">联系电话</label>
        <input type="tel" name="phone" required pattern="1[3-9]\d{9}" placeholder="请输入手机号">
      </div>

      <div class="form-row">
        <label class="form-label required">户口性质</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="household" value="农村" required> 农村</label>
          <label class="radio-item"><input type="radio" name="household" value="城镇"> 城镇</label>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══ 模块3：求职意向信息 ═══ -->
  <div class="section">
    <div class="section-title">
      <span class="section-num">3</span> 求职意向信息
    </div>
    <div class="section-body">

      <div class="form-row">
        <label class="form-label required">应聘岗位</label>
        <input type="text" name="position" required placeholder="请输入应聘岗位">
      </div>

      <div class="form-row">
        <label class="form-label required">目前薪资（月薪 / 年薪）</label>
        <input type="text" name="currentSalary" required placeholder="如：15K（月薪）或 18万（年包）">
      </div>

      <div class="form-row">
        <label class="form-label required">期望薪资（月薪 / 年薪）</label>
        <input type="text" name="expectedSalary" required placeholder="如：20K（月薪）或 25万（年包）">
      </div>

      <div class="form-row">
        <label class="form-label required">可入职时间</label>
        <input type="date" name="availableDate" required>
      </div>

      <div class="form-row">
        <label class="form-label required">在职状态</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="employmentStatus" value="已离职" required> 已离职</label>
          <label class="radio-item"><input type="radio" name="employmentStatus" value="在职未提"> 在职未提离职</label>
          <label class="radio-item"><input type="radio" name="employmentStatus" value="在职已提"> 在职已提离职</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label required">岗位偏好</label>
        <div class="check-group" id="preferenceGroup">
          <label class="check-item"><input type="checkbox" name="positionPreference" value="只考虑专业/专家岗"> 只考虑专业/专家岗</label>
          <label class="check-item"><input type="checkbox" name="positionPreference" value="只考虑管理岗"> 只考虑管理岗</label>
          <label class="check-item"><input type="checkbox" name="positionPreference" value="都考虑"> 都考虑</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label required">是否在本公司应聘过</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="appliedBefore" value="是" required> 是</label>
          <label class="radio-item"><input type="radio" name="appliedBefore" value="否"> 否</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label required">是否有熟人在司工作</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="hasAcquaintance" value="是" required> 是</label>
          <label class="radio-item"><input type="radio" name="hasAcquaintance" value="否"> 否</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label required">是否有重大手术 / 病史</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="hasMedical" value="是" required onclick="document.getElementById('medicalNote').classList.add('show')"> 是</label>
          <label class="radio-item"><input type="radio" name="hasMedical" value="否" onclick="document.getElementById('medicalNote').classList.remove('show')"> 否</label>
        </div>
        <div class="conditional" id="medicalNote">
          <input type="text" name="medicalNote" placeholder="请补充说明">
        </div>
      </div>

    </div>
  </div>

  <!-- ═══ 模块4：落款 ═══ -->
  <div class="section">
    <div class="section-title">
      <span class="section-num">4</span> 落款
    </div>
    <div class="section-body">
      <div class="form-row">
        <label class="form-label required">应聘人签字</label>
        <input type="text" name="signature" required placeholder="请输入您的姓名作为签字确认">
      </div>
      <div class="form-row">
        <label class="form-label required">填写日期</label>
        <input type="date" name="fillDate" required>
      </div>
    </div>
  </div>

  <!-- ═══ 提交 ═══ -->
  <button type="submit" class="btn btn-submit">提 交 登 记 表</button>

</form>

<div class="footer">
  杭州黑白调科技有限公司 © 2026 · 应聘登记表
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 飞书 Webhook
// ═══════════════════════════════════════════
const FEISHU_URL = 'https://open.feishu.cn/open-apis/bot/v2/hook/05c49eb9-cfe2-42ac-9526-b405245e11e0';

// ═══════════════════════════════════════════
// 岗位偏好：至少选一项
// ═══════════════════════════════════════════
document.getElementById('applicationForm').addEventListener('submit', function(e) {
  e.preventDefault();

  // ── 必填字段校验 ──
  const required = this.querySelectorAll('[required]');
  let valid = true;
  required.forEach(el => {
    if (el.type === 'radio') {
      const name = el.name;
      const checked = this.querySelector(`input[name="${name}"]:checked`);
      if (!checked) {
        valid = false;
        const group = el.closest('.radio-group');
        if (group) group.style.outline = '2px solid var(--danger)';
        group.addEventListener('change', function fix() { group.style.outline = ''; group.removeEventListener('change', fix); });
      }
    } else if (!el.value.trim()) {
      valid = false;
      el.style.borderColor = 'var(--danger)';
      el.addEventListener('input', function fix() { el.style.borderColor = 'var(--border)'; el.removeEventListener('input', fix); });
    }
  });

  if (!valid) {
    showToast('请填写所有必填项', 'error');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── 手机号校验 ──
  const phone = this.querySelector('[name="phone"]');
  if (!/^1[3-9]\d{9}$/.test(phone.value)) {
    showToast('请输入正确的手机号', 'error');
    phone.focus();
    return;
  }

  // ── 岗位偏好至少选一项 ──
  const preferences = this.querySelectorAll('[name="positionPreference"]:checked');
  if (preferences.length === 0) {
    showToast('请至少选择一项岗位偏好', 'error');
    document.getElementById('preferenceGroup').style.outline = '2px solid var(--danger)';
    return;
  }

  // ── 病史选"是"时备注必填 ──
  const hasMedicalYes = this.querySelector('[name="hasMedical"]:checked');
  if (hasMedicalYes && hasMedicalYes.value === '是') {
    const note = this.querySelector('[name="medicalNote"]');
    if (!note.value.trim()) {
      showToast('请补充重大手术/病史说明', 'error');
      note.focus();
      return;
    }
  }

  // ── 收集数据 ──
  const fd = new FormData(this);
  const data = {};
  fd.forEach((v, k) => {
    if (data[k]) {
      data[k] = Array.isArray(data[k]) ? [...data[k], v].join('、') : [data[k], v].join('、');
    } else {
      data[k] = v;
    }
  });

  // ── 构建飞书消息 ──
  const label = {
    name:'姓名', birthday:'出生年月日', ethnicity:'民族', marital:'婚姻状况',
    address:'现住址', phone:'联系电话', household:'户口性质',
    position:'应聘岗位', currentSalary:'目前薪资', expectedSalary:'期望薪资',
    availableDate:'可入职时间', employmentStatus:'在职状态',
    positionPreference:'岗位偏好', appliedBefore:'是否在本公司应聘过',
    hasAcquaintance:'是否有熟人在司工作', hasMedical:'是否有重大手术/病史',
    medicalNote:'病史备注', signature:'应聘人签字', fillDate:'填写日期'
  };

  let fields = '';
  for (const [k, v] of Object.entries(data)) {
    const name = label[k] || k;
    if (String(v).trim()) fields += `${name}：${v}\n`;
  }

  
  showToast('正在提交...');

  var text='📋 新应聘登记表\n';
  text+='━━━━━━━━━━━━\n';
  text+='姓名：'+data.name+'\n';
  text+='电话：'+data.phone+'\n';
  text+='岗位：'+data.position+'\n';
  text+='━━━━━━━━━━━━\n';
  text+=fields;
  text+='\n提交时间：'+new Date().toLocaleString('zh-CN');

  var payload={
    msg_type: 'text',
    content: { text: text }
  };
  var self=this;
  fetch(FEISHU_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); }).then(function(r){
    if (r.code === 0) {
      showToast('✅ 提交成功！感谢您的填写');
      self.reset();
      var now=new Date();
      var today=now.toISOString().split('T')[0];
      self.querySelectorAll('input[type="date"]').forEach(function(el){ el.value=today; });
      document.getElementById('medicalNote').classList.remove('show');
    } else {
      showToast('❌ 飞书错误：' + (r.msg || JSON.stringify(r)), 'error');
    }
  }).catch(function(e){
    showToast('❌ 网络错误：' + e.message, 'error');
  });
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}

// ═══════════════════════════════════════════
// Init — 预填今日日期
// ═══════════════════════════════════════════
(function() {
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  document.querySelectorAll('input[type="date"]').forEach(el => {
    if (!el.value) el.value = today;
  });
})();
</script>

</body>
</html>
